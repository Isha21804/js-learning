<body>
    <script>
        function tofahrenhiet(celsiusValue){
            return 9/5 * celsiusValue + 32;
        }
        console.log(tofahrenhiet(32));
        console.log(tofahrenhiet(21));
        console.log(tofahrenhiet(0));
        console.log(tofahrenhiet(40));
    </script>
</body>
