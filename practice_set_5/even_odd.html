<body>
    <script>
        function isOdd (num){
        let rem = num % 2;
        let isOdd = rem ==1;
        return isOdd;
        }
        console.log(isOdd (7));
        console.log(isOdd (47));
        console.log(isOdd (83));
        console.log(isOdd (20));
        console.log(isOdd (12));
</script>
