<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //comparison operator 
        console.log(5<9);
        console.log(4>8);
        console.log(typeof (6<7)); // checks the data type
        console.log(typeof true); 

        console.log(5 == 5); // checks the value equality
        console.log(9 == 4);

        console.log(5 ==='5'); // checks the value & type equality
        console.log(5 ==='6');
        console.log(2 ===2 );

        console.log(4 != 5); // checks the value inequality
        console.log(5 != 5);

        console.log(4 !== 5); //checks value and type inequality  
        console.log(4 != '5'); 
        console.log(4 != 4); 

      // Relational operator
        console.log(4>6);  // less than
        console.log(4<6);  // greater than
        console.log(4>=4); // greater than or equal to
        console.log(4<=3); // less than or equal to

        console.log(5+3 === 4+4); // order of comparsion operator is less than arithmetic operator

    </script>
</body>
</html>
