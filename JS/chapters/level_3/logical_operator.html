<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <script>
     let age=22;

     // In AND operator both condition must be true.
     if(age>18 && age>25)
     {
       console.log('you are eligible for vote');
     }
     else
     {
       console.log('you are not eligible for vote');
     }


     // In OR operator only one condition must be true.
     if(age>18 || age>25) 
     {
       console.log('you are eligible for vote');
     }
     else
     {
       console.log('you are not eligible for vote');
     }


     // NOT operator Gives the opposite boolean value.
     console.log(!false);
     console.log(!true);
  </script>
</body>
</html>
