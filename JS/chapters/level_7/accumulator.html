<body>
    <script>
     let num =[1, 3, 4, 34, 65, 7.5, 2];
     let sum = 0;
     for( let i=0; i<num.length; i++){
      sum += num[i];
     }
     console.log(`The sum of the array is ${sum}`);

     let squares =[];
     for( let i=0; i<num.length; i++){
     squares.push= num[i]* num[i];
     }
     console.log(squares);

    </script>
</body>
