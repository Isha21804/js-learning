<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="my-click">Click me</button>

    <script>
        let eventElement = document.querySelector('#my-click');
        let behaviour = event => console.log('I am clicked');
        eventElement.addEventListener('click',behaviour);

        // Adding Multiple listener
        let printDate = event => console.log(new Date());
        eventElement.addEventListener('click',printDate);

        eventElement.removeEventListener('click',behaviour); // Removes Event Listener.
    </script> 
</body>
</html>
