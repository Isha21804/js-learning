<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        localStorage.setItem('name','Isha');
        localStorage.setItem('age', 21);
     // localStorage.setItem('profession','Front-end engineer');
        console.log(localStorage.getItem('profession'));

        let product={
            name: 'Shirt',
            price: 569,
            color: 'White'
        };
        console.log(product);
        localStorage.setItem('product', JSON.stringify(product));
        console.log(localStorage.getItem('product'));
    
        let newProduct = JSON.parse(localStorage.getItem('product'));
        console.log(newProduct);

        localStorage.removeItem('age');  // removes items
        localStorage.clear();           // clear local stroge
    </script>
</body>
</html>
