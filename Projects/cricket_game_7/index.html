<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
<body>  
     <!-- Cricket_game using function with return statement -->
      
    <h1>Cricket Game</h1>
     <!-- Bat -->
    <button class="choice-button" onclick="
    let computer_choice= generateComputerChoice ();
    let resultMsg = getResult('Bat', computer_choice);
    showResult( 'Bat',computer_choice,resultMsg);
    ">
    <img src="images/bat.avif" alt="bat" class="choice-img">
    </button>

     <!-- Ball -->
    <button class="choice-button" onclick="
    computer_choice= generateComputerChoice ();
    resultMsg = getResult('Ball', computer_choice);
    showResult( 'Ball',computer_choice, resultMsg );
    "><img src="images/ball.jpg" alt="ball" class="choice-img">
    </button>

    <!-- Stump -->
    <button class="choice-button" onclick="
    computer_choice= generateComputerChoice ();
    resultMsg = getResult('Stump', computer_choice);
    showResult( 'Stump',computer_choice, resultMsg);
    "><img src="images/stump.avif" alt="stump" class="choice-img">
    </button>

      <h3 id="user-move"></h3>
      <h3 id="computer-move"></h3>
      <h3 id="result"></h3>
      <h3 id="score"></h3>
      
    <button onclick="localStorage.clear()
      resetScore();
    ">Reset</button>

    <script> 
    let scoreStr = localStorage.getItem('Score');
    let score;
    resetScore(scoreStr);

    function resetScore(scoreStr){
    score =  scoreStr ? JSON.parse(scoreStr): {
     Win: 0,
     Lost: 0,
     Tie: 0,
    };
    score.displayScore=  function(){
    return `Won: ${score.Win}  Lost: ${score.Lost}  Tie: ${score.Tie}`
    };
    showResult()
    }

    function generateComputerChoice () {
    let random_Number= Math.random()*3;
    if(random_Number>0 && random_Number<=1){
    return 'Bat';
    }
    else if(random_Number>1 && random_Number<=2){
    return  'Ball';
    }
    else{
    return 'Stump';
    }
    }
     // Bat
    function getResult (userMove, computerMove) {
     if(userMove === 'Bat') {
     if(computerMove ==='Ball'){
        score.Win ++;
     return (`User has won`);  }
     else if(computerMove === 'Bat')  {
        score.Tie ++;
     return (` It's a tie`);   }
     else if(computerMove === 'Stump') {
        score.Lost ++;
     return ('Computer has won');   
      }}
     
     // Ball 
     else if(userMove === 'Ball'){ 
     if(computerMove === 'Ball')  {
        score.Tie ++;
     return (`It's a tie`);  }
     else if(computerMove === 'Bat' && userMove === 'Ball') {
        score.Lost ++;
     return ('Computer has won'); 
      }
     else if(computerMove === 'Stump' && userMove === 'Ball') {
        score.Win ++;
     return ('User has won'); 
     }}

     // Stump
    else {
    if(computerMove ==='Ball')  {
        score.Lost ++;
    return (`Computer has won`);  }
    else if(computerMove === 'Bat') {
        score.Win ++;
    return (`User has won`); }
    else if(computerMove === 'Stump') {
        score.Tie ++;
    return (`It's a tie`);   
    }}
    }

    function showResult (userMove,computerMove, resultMsg){   
    localStorage.setItem('Score',JSON.stringify(score)); 

    document.querySelector('#user-move').innerText=
    userMove ? `You have chosen ${userMove}`: '';

    document.querySelector('#computer-move').innerText=
    computerMove ? `Computer choice is ${computerMove}`: '';

    document.querySelector('#result').innerText=
     resultMsg || '';

    document.querySelector('#score').innerText= 
    score.displayScore();
   }
   </script>
</body>
</html>
